<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Positioning Lab</title>
    <style type="text/css">
      /* ---------------Box Sizing----------------- */
      html {
        box-sizing: border-box;
      }
      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }
      body {
        background-color: #ececec;
        font-weight: bold;
        font-family: Tahoma, Geneva, sans-serif;
        color: #fff;
        text-align: center;
        line-height: 24px;
      }
      #wrapper {
        background-color: #fff;
        border: 1px solid #c0c0c0;
        width: 800px;
        margin-right: auto;
        margin-left: auto;
        text-shadow: 2px 2px #000;
        padding-top: 20px;
        padding-bottom: 20px;
        overflow: hidden;
      }

      #navy,
      #teal,
      #blue,
      #aqua {
        width: 175px;
        height: 150px;
        float: left;
        margin-left: 20px;
        margin-bottom: 20px;
        padding-top: 10px;
      }

      #navy {
        background-color: #001f3f;
      }
      #teal {
        background-color: #39cccc;
      }
      #blue {
        background-color: #0074d9;
      }
      #aqua {
        background-color: #7fdbff;
      }

      #footer {
        background-color: #666;
        clear: both;
        margin: 0 20px;
        padding: 10px 0;
      }

      h1 {
        color: #000;
        font-weight: normal;
        padding: 50px;
      }
    </style>
  </head>
  <body>
    <h1>FLOAT 2</h1>
    <section id="wrapper">
      <div id="navy">Navy</div>
      <div id="teal">Teal</div>
      <div id="blue">Blue</div>
      <div id="aqua">Aqua</div>
      <div id="footer">Footer</div>
    </section>
  </body>
</html>
